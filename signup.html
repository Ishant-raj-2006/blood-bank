<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

  <h2>Create Account</h2>

  <input type="text"
  id="name"
  placeholder="Full Name">

  <input type="email"
  id="email"
  placeholder="Email">

  <input type="password"
  id="password"
  placeholder="Password">

  <button onclick="signup()">
    Signup
  </button>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
